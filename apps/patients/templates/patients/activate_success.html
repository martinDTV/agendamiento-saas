<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta activada — NexoSoftDev</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #F0F4F9;
            color: #15263F;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.5;
        }
        .card {
            background: #FFFFFF;
            border-radius: 20px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(21, 38, 63, 0.08);
            overflow: hidden;
        }
        .header {
            background: #15263F;
            color: #FFFFFF;
            padding: 24px;
        }
        .header-title { font-size: 18px; font-weight: 700; }
        .header-subtitle { font-size: 12px; color: #B3C4D9; margin-top: 4px; }
        .body { padding: 40px 32px; }
        .icon-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: #D1FAE5;
            color: #047857;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-wrap svg { width: 44px; height: 44px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: #15263F; }
        p { color: #475569; font-size: 16px; margin-bottom: 24px; }
        .email { font-weight: 600; color: #15263F; }
        .btn {
            display: inline-block;
            background: #15263F;
            color: #FFFFFF;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
        }
        .footer { background: #F0F4F9; padding: 16px; font-size: 12px; color: #94A3B8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="header-title">NexoSoftDev</div>
            <div class="header-subtitle">Agendamiento médico</div>
        </div>
        <div class="body">
            <div class="icon-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h1>¡Cuenta activada!</h1>
            <p>
                Tu cuenta <span class="email">{{ email }}</span> está lista.
                Ya puedes iniciar sesión desde la app.
            </p>
            <a href="agendamiento://login" class="btn">Abrir la app</a>
        </div>
        <div class="footer">© NexoSoftDev</div>
    </div>
</body>
</html>
